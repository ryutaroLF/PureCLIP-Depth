# Deleted unused parameters 2025.09.01

[IDENTIFICATION]
model_identifier    = v300

[TRAINING]
batch_size           = 8
num_epochs           = 200
early_stopping       = True
patience             = 200
model_save_dir_path   = ./checkpoints
device              = cuda
fusion_type         = concat

# disable = True : No progress bar 
tqdm_disable        = False

resume_epoch        = 0 
# 0:start from scratch, -1: resume from latest,
# specify epoch number to resume from that epoch

# if True, only run evaluation without training

counter_start_decay = 10
weight_decay = 1e-2

######## For LR ########
lr_mlp = 3e-4
lr_bin_center = 1e-3

######## For Depth Bin and CLIP #########
num_bins = 15
min_depth_nyu = 1e-3
max_depth_nyu = 10
min_depth_kitti = 1e-3
max_depth_kitti = 30
switch_steps = 100
input_size  = 336

[CLIP]
clip_model_name  = ViT-L/14@336px

# ViT-L-14 ` 336 -> lain2b_s32b_b82k
# ViT-B-32 ` 224 -> lain2b_s34b_b79k


[TEST]
# eigen_test [top, bottom, left, right]
eigen_test           = 32, 376, 23, 362
# min_depth_test and max_depth_test are used for evaluation.
# These values are used by WorDepth
min_depth_test       = 1e-3
max_depth_test       = 10.0 

test_only = True
plot_prediction = True
plot_dual_heatmap = True
use_TTA = True
debug_valid = True
save_valid_masks = True

[DATASET]
dataset_type      = KITTI

[DATASET_WIN]
nyu_dataset_root_dir_path       = K:\NYU_Depth_v2_Official/
kitti_dataset_root_dir_path     = G:\KITTI/

kitti_Garg_crop_mask_path = G:\KITTI\Garg_crop_mask.png


[DATASET_TSUBAME]
nyu_dataset_root_dir_path       = /gs/fs/tga-nn/MDE_dataset/NYU_Depth_v2_Official/
kitti_dataset_root_dir_path     = /gs/fs/tga-nn/MDE_dataset/KITTI/

kitti_Garg_crop_mask_path = /gs/fs/tga-nn/MDE_dataset/KITTI/Garg_crop_mask.png

[DEBUG]
debug_short_train_loop = False